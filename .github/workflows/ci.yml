name: CI

on: ["push"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: NPM Install
        run: npm ci --ignore-scripts --prefer-offline --legacy-peer-deps
      - name: Test
        run: npm test
